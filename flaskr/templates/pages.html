{% extends "main.html" %}

{% block page_name %}
Wiki Pages
{% endblock %}

{% block content %}
<!-- CHANGE: Improved page list layout so the content uses space more effectively -->
<section class="content-section">
    <h2>Pages contained in this Wiki</h2>

    <ul class="page-list">
        {% for page in all_pages %}
        <li>
            <a href="{{ url_for('pages', name=page) }}">{{ page }}</a>
        </li>
        {% endfor %}
    </ul>
</section>
{% endblock %}
