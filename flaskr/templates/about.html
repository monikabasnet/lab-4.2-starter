{% extends "main.html" %}

{% block page_name %}
About Cats on Skis
{% endblock %}

{% block content %}
<!--clearer sections with better spacing and readable structure -->
<section class="content-section">
    <h2>About Cats on Skis</h2>
    <p>
        We love Cats on Skis! This is the best place to find information about cats on skis.
    </p>
</section>

<section class="content-section">
    <h2>Your Authors</h2>

    <div class="author-card">
        <div>
            <h3>Slalom Sammy</h3>
            <p>Lead cat reporter and expert downhill skier.</p>
        </div>

        <img
            class="author-image"
            src="{{ url_for('images', image='slalom-sammy') }}"
            alt="Slalom Sammy, a cat on skis"
        >
    </div>
</section>
{% endblock %}
